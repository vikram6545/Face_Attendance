<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mark Attendance | Smart System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #video-container { position: relative; width: 100%; max-width: 500px; margin: auto; }
        #video { width: 100%; border-radius: 15px; border: 5px solid #0d6efd; transform: scaleX(-1); background: #000; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                    border: 2px dashed #00ff00; width: 220px; height: 220px; border-radius: 50%; pointer-events: none; }
    </style>
</head>

<body class="bg-light">
    <div class="container mt-3">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'warning' %}warning{% elif message.tags == 'info' %}info{% else %}success{% endif %} alert-dismissible fade show" role="alert">
                    <strong>Alert:</strong> {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <div class="container py-5 text-center">
        <h2 class="mb-4">Face Recognition</h2>
        
        <div id="video-container">
            <video id="video" autoplay playsinline></video>
            <div class="overlay"></div>
        </div>

        <form id="attendance-form" method="POST" action="{% url 'mark_attendance' %}" class="mt-4">
             {% csrf_token %}
            <input type="hidden" id="image_data" name="image">
            <input type="hidden" id="lat" name="lat" value="0">
            <input type="hidden" id="lon" name="lon" value="0">
            
            <button type="button" id="capture-btn" onclick="captureImage()" class="btn btn-success btn-lg px-5 shadow">
                📸 Capture & Mark
            </button>
            
            <div class="mt-3">
                <a href="{% url 'student_dashboard' %}" class="btn btn-outline-secondary">
                    ⬅ Back to Dashboard
                </a>
            </div>
        </form>

        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture-btn');

        // 1. Camera Start Karein
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                console.error("Error: ", err);
                alert("Camera allow karein!");
            }
        }

        // 2. Page khulte hi Location fetch karein
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    document.getElementById('lat').value = position.coords.latitude;
                    document.getElementById('lon').value = position.coords.longitude;
                    console.log("Location Fetched:", position.coords.latitude, position.coords.longitude);
                }, function(error) {
                    console.error("Location error:", error.message);
                });
            }
        }

        function captureImage() {
            // Check karein ki location mil gayi ya nahi
            const lat = document.getElementById('lat').value;
            if (lat == "0") {
                alert("Kripya thoda wait karein, location fetch ho rahi hai...");
                getLocation(); // Dobara koshish karein
                return;
            }

            captureBtn.disabled = true;
            captureBtn.innerText = "Processing...";

            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);

            const dataUrl = canvas.toDataURL('image/jpeg');
            document.getElementById('image_data').value = dataUrl;
            
            document.getElementById('attendance-form').submit();
        }

        // Shuru karein
        startCamera();
        getLocation();
    </script>
</body>
</html>
