<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Complete Your Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4 rounded-4" style="width: 100%; max-width: 600px;">

        <h3 class="text-center text-primary mb-4">Complete Your Profile</h3>

       

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Roll Number -->
            <div class="row mb-3 align-items-center">
                <label for="{{ form.roll_no.id_for_label }}" class="col-sm-3 col-form-label">Roll Number</label>
                <div class="col-sm-9">
                    {{ form.roll_no }}
                </div>
            </div>

            <!-- Course -->
            <div class="row mb-3 align-items-center">
                <label for="{{ form.course.id_for_label }}" class="col-sm-3 col-form-label">Course</label>
                <div class="col-sm-9">
                    {{ form.course }}
                </div>
            </div>

            <!-- Year -->
            <div class="row mb-3 align-items-center">
                <label for="{{ form.year.id_for_label }}" class="col-sm-3 col-form-label">Year</label>
                <div class="col-sm-9">
                    {{ form.year }}
                </div>
            </div>

            <!-- Semester -->
            <div class="row mb-3 align-items-center">
                <label for="{{ form.semester.id_for_label }}" class="col-sm-3 col-form-label">Semester</label>
                <div class="col-sm-9">
                    {{ form.semester }}
                </div>
            </div>

            <!-- Upload Profile Picture -->
            <div class="row mb-3 align-items-center">
                <label for="{{ form.face_baseline.id_for_label }}" class="col-sm-3 col-form-label">Upload Profile Picture</label>
                <div class="col-sm-9">
                    {{ form.face_baseline }}
                </div>
            </div>

            <!-- Submit Button -->
            <div class="row mb-3">
                <div class="col-sm-9 offset-sm-3">
                    <button type="submit" class="btn btn-primary w-100 py-2">Submit</button>
                </div>
            </div>

        </form>

    </div>
</div>

</body>
</html>
