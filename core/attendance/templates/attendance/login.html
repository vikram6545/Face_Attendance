<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login | Smart Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; }
        .login-card { border-radius: 15px; border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-primary { border-radius: 10px; padding: 10px; font-weight: bold; }
    </style>
</head>
<body class="d-flex align-items-center" style="height: 100vh;">
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card login-card p-4">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Welcome Back</h2>
                        <p class="text-muted">Login to mark your attendance</p>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login Now</button>
                    </form>
                    <br>
                    <p>Don't have an account?</p>
                    <a href="{% url 'student_signup' %}" class="btn btn-outline-primary w-100">Signup</a>



                </div>
            </div>
        </div>
    </div>
</body>
</html>
