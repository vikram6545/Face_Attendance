<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4 rounded-4" style="width: 100%; max-width: 500px;">

        <h3 class="text-center text-primary mb-4">Create Account</h3>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success">{{ message }}</div>
            {% endfor %}
        {% endif %}
        
        {% if form.errors %}
            <div class="alert alert-danger">
                {{ form.errors }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                {{ form.username }}
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                {{ form.email }}
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                {{ form.password }}
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                {{ form.confirm_password }}
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">
                Register
            </button>
        </form>

        <hr>

        <p class="text-center mb-2">Already have an account?</p>
        <a href="{% url 'login' %}" class="btn btn-outline-primary w-100">
            Login
        </a>

    </div>
</div>

</body>
</html>
